# Redis message queue persistence config
# Used by: msg:queue:pending, batch_msg_queue_failed, batch_msg_queue_dead
#
# Strategy: AOF everysec (max 1s data loss window)
# Why not RDB: snapshots every 60s -> lose up to 60s of enqueued messages on crash
# Why not AOF always: unnecessary fsync overhead for our throughput (~1000 msg/100ms)

# === AOF (Append Only File) ===
appendonly yes
appendfsync everysec
# Auto-rewrite when file grows 100% from last rewrite and exceeds 64MB
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# === RDB (snapshot) as secondary safety net ===
# Still keep occasional snapshots for faster cold restart
save 900 1
save 300 10
save 60 10000

# === Disk path ===
dir ./data
dbfilename dump.rdb
appendfilename "appendonly.aof"
