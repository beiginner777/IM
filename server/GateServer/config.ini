Port = 3307
User = root
Password = 123456
Schema = JerryChat
; Slave 端口（可选，配置后纯读操作走 Slave）
SlaveHost = 127.0.0.1
SlavePort = 3308
[StatusServer]
Host = 127.0.0.1
Port = 50052
