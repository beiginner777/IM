
; 在后面的内容 不要加 "" 因为这样的话，在解析出来的数据就会变成 "127.0.0.1" 而不是 字符串类型的 127.0.0.1

[Redis]
Host = 127.0.0.1
Port = 6380
Password = 123456
SentinelHost = 127.0.0.1
SentinelPort = 26379,26380,26381
; Slave 端口（可选，逗号分隔。配置后纯读操作随机走 Slave）
SlavePorts = 6381,6382
[Mysql]
